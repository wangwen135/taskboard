<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>想法记录 v2.5.3</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        /* Linear 暗色风格 (默认) */
        :root[data-theme="linear"]{
            --bg-primary: #0d0d0d;
            --bg-secondary: #1a1a1a;
            --bg-tertiary: #242424;
            --bg-hover: #2a2a2a;
            --border: #333;
            --border-light: #444;
            --text-primary: #f0f0f0;
            --text-secondary: #999;
            --text-muted: #666;
            --accent: #5e6ad2;
            --accent-hover: #6f7be8;
            --accent-bg: rgba(94,106,210,0.1);
            --high: #f56565;
            --medium: #ed8936;
            --low: #48bb78;
            --done: #4299e1;
            --shadow: 0 4px 24px rgba(0,0,0,0.4);
            --radius: 8px;
            --radius-sm: 6px;
            --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
        }
        /* Linear 亮色风格 */
        :root[data-theme="linear-light"]{
            --bg-primary: #ffffff;
            --bg-secondary: #f5f5f7;
            --bg-tertiary: #e8e8ed;
            --bg-hover: #e0e0e5;
            --border: #d2d2d7;
            --border-light: #c0c0c7;
            --text-primary: #1d1d1f;
            --text-secondary: #6e6e73;
            --text-muted: #a1a1a6;
            --accent: #5e6ad2;
            --accent-hover: #4e5ab8;
            --accent-bg: rgba(94,106,210,0.08);
            --high: #e03e3e;
            --medium: #d97300;
            --low: #0d805e;
            --done: #056ab8;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --radius: 8px;
            --radius-sm: 6px;
            --font-mono: 'SF Mono', 'Fira Code', Consolas, monospace;
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'Inter',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;font-size:18px;line-height:1.6}
        
        .container{max-width:1600px;margin:0 auto;padding:28px 40px}
        
        /* View Switcher Row (inside filter-section) */
        .view-switcher-row{display:flex;align-items:center;gap:4px}
        .view-btn-large{display:flex;align-items:center;gap:7px;padding:8px 18px;border:none;border-radius:calc(var(--radius) - 2px);background:transparent;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-secondary);transition:all 0.2s;white-space:nowrap}
        .view-btn-large:hover{color:var(--text-primary);background:var(--bg-hover)}
        .view-btn-large.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(94,106,210,0.3)}
        .view-btn-large.active:hover{background:var(--accent-hover)}
        .view-icon{font-size:16px}
        
        /* Filter Section */
        .filter-section{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:20px}
        .filter-row{display:flex;gap:16px;align-items:center;flex-wrap:wrap}
        .filter-group{display:flex;gap:4px;align-items:center}
        .filter-label{font-size:13px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-right:4px}
        /* Search box on the right */
        .search-box{margin-left:auto}
        
        /* Tags Filter Cloud (Multi-select) */
        .tags-filter-cloud{display:flex;gap:6px;flex-wrap:wrap;max-width:600px}
        .tag-filter-chip{padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:var(--bg-primary);cursor:pointer;font-size:14px;color:var(--text-secondary);transition:all 0.15s;display:flex;align-items:center;gap:6px}
        .tag-filter-chip:hover{border-color:var(--accent);color:var(--text-primary)}
        .tag-filter-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .tag-filter-chip .check{display:none;font-size:12px}
        .tag-filter-chip.active .check{display:inline}
        
        /* Priority Filter Selector */
        .priority-filter-selector{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
        .pri-filter-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:var(--bg-primary);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:all 0.15s;height:32px}
        .pri-filter-btn:hover{border-color:var(--border-light);color:var(--text-primary)}
        .pri-filter-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--text-primary)}
        .pri-filter-btn[data-pri="high"].active{background:rgba(245,101,101,0.15);border-color:var(--high);color:var(--high)}
        .pri-filter-btn[data-pri="medium"].active{background:rgba(237,137,54,0.15);border-color:var(--medium);color:var(--medium)}
        .pri-filter-btn[data-pri="low"].active{background:rgba(72,187,120,0.15);border-color:var(--low);color:var(--low)}
        
        /* Status Filter Selector */
        .status-filter-selector{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
        .status-filter-btn{display:flex;align-items:center;gap:5px;padding:6px 12px;border:1px solid var(--border);border-radius:999px;background:var(--bg-primary);cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:all 0.15s;height:32px}
        .status-filter-btn:hover{border-color:var(--border-light);color:var(--text-primary)}
        .status-filter-btn.active{background:var(--accent-bg);border-color:var(--accent);color:var(--text-primary)}
        .status-filter-btn[data-status="done"].active{background:rgba(66,153,225,0.15);border-color:var(--done);color:var(--done)}
        .status-filter-btn[data-status="pending"].active{background:rgba(237,137,54,0.15);border-color:var(--medium);color:var(--medium)}
        
        /* Search Box */
        .search-box{width:180px}
        .search-box input{width:100%;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-primary);font-size:13px;transition:all 0.15s;height:32px}
        .search-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
        .search-box input::placeholder{color:var(--text-muted)}
        
        /* Hide filter groups based on view */
        .filter-section.hide-priority .filter-group-priority{display:none}
        .filter-section.hide-status .filter-group-status{display:none}
        .filter-section.hide-tags .filter-group-tags{display:none}
        
        /* Content Area Full Width */
        .content-area-full{width:100%}
        
        /* Header */
        header{display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;padding-bottom:18px;border-bottom:1px solid var(--border)}
        header h1{font-size:22px;font-weight:600;display:flex;align-items:center;gap:10px;letter-spacing:-0.02em}
        .version{font-size:14px;color:var(--text-muted);font-weight:400;margin-left:8px;font-family:var(--font-mono)}
        .header-actions{display:flex;gap:6px}
        .btn-icon{width:38px;height:38px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-secondary);cursor:pointer;font-size:18px;color:var(--text-secondary);transition:all 0.15s;display:flex;align-items:center;justify-content:center}
        .btn-icon:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-light)}
        
        /* Add Section */
        .add-section{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:20px}
        .add-title{font-size:15px;font-weight:600;margin-bottom:12px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:0.08em}
        
        .input-area{display:flex;flex-direction:column;gap:12px}
        .input-wrapper{width:100%}
        .input-wrapper textarea{width:100%;min-height:90px;padding:14px 16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);font-size:16px;resize:vertical;transition:all 0.15s;font-family:inherit}
        .input-wrapper textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
        .input-wrapper textarea::placeholder{color:var(--text-muted)}
        
        .input-footer{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
        .tag-input{flex:1;min-width:180px;padding:7px 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-primary);font-size:14px;transition:all 0.15s;height:32px}
        .tag-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
        .tag-input::placeholder{color:var(--text-muted)}
        
        .priority-selector{display:flex;gap:4px;padding:3px;background:var(--bg-primary);border:1px solid var(--border);border-radius:999px;height:32px;box-sizing:border-box}
        .pri-btn{display:flex;align-items:center;gap:5px;padding:4px 10px;border:none;border-radius:999px;background:transparent;cursor:pointer;font-size:13px;font-weight:500;color:var(--text-secondary);transition:all 0.15s;white-space:nowrap;height:26px}
        .pri-btn:hover{color:var(--text-primary)}
        .pri-btn.active-high{background:rgba(245,101,101,0.15);color:var(--high)}
        .pri-btn.active-medium{background:rgba(237,137,54,0.15);color:var(--medium)}
        .pri-btn.active-low{background:rgba(72,187,120,0.15);color:var(--low)}
        .pri-dot{width:6px;height:6px;border-radius:50%}
        .pri-dot.high{background:var(--high)}
        .pri-dot.medium{background:var(--medium)}
        .pri-dot.low{background:var(--low)}
        
        .btn-add{padding:7px 18px;background:var(--accent);color:#fff;border:none;border-radius:var(--radius-sm);cursor:pointer;font-weight:500;font-size:14px;transition:all 0.15s;white-space:nowrap;height:32px}
        .btn-add:hover{background:var(--accent-hover);transform:translateY(-1px)}
        
        .selected-tags{display:flex;gap:6px;flex-wrap:wrap;min-height:20px}
        .tag-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;background:var(--bg-tertiary);border-radius:999px;font-size:17px;color:var(--text-secondary);border:1px solid var(--border)}
        .tag-chip span{cursor:pointer;opacity:0.7;font-weight:bold;font-size:17px;line-height:1}
        .tag-chip span:hover{opacity:1;color:var(--high)}
        
        /* Filter Section */
        .filter-section{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;margin-bottom:24px}
        .filter-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
        .filter-group{display:flex;gap:8px;align-items:center}
        .filter-label{font-size:17px;color:var(--text-muted);font-weight:500;text-transform:uppercase;letter-spacing:0.05em}
        .filter-select{padding:7px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-primary);font-size:16px;cursor:pointer;transition:all 0.15s}
        .filter-select:focus{outline:none;border-color:var(--accent)}
        .filter-select:hover{border-color:var(--border-light)}
        
        .search-box{position:relative;flex:1;min-width:200px}
        .search-box input{width:100%;padding:7px 11px 7px 32px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-primary);color:var(--text-primary);font-size:16px;transition:all 0.15s}
        .search-box input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
        .search-box::before{content:"🔍";position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:16px;opacity:0.5}
        
        .view-switcher{display:flex;gap:4px;margin-left:auto;padding:3px;background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm)}
        .view-btn{padding:5px 11px;border:none;border-radius:6px;background:transparent;cursor-pointer;font-size:17px;font-weight:500;color:var(--text-secondary);transition:all 0.15s}
        .view-btn:hover{color:var(--text-primary)}
        .view-btn.active{background:var(--bg-tertiary);color:var(--text-primary)}
        
        /* Main Layout */
        .main{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:start}
        
        /* Sidebar - Tags Cloud */
        .sidebar{position:sticky;top:24px;height:fit-content;max-height:calc(100vh - 48px);overflow-y:auto;padding-right:4px}
        .sidebar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border)}
        .side-title{font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.08em}
        .tags-filter-cloud-sidebar{display:flex;flex-direction:column;gap:4px}
        .tag-filter-chip-sidebar{padding:6px 11px;border:1px solid var(--border);border-radius:var(--radius-sm);background:var(--bg-secondary);cursor:pointer;font-size:13px;color:var(--text-secondary);transition:all 0.15s;display:flex;align-items:center;justify-content:space-between;min-height:32px}
        .tag-filter-chip-sidebar:hover{background:var(--bg-hover);border-color:var(--border-light);color:var(--text-primary)}
        .tag-filter-chip-sidebar.active{background:var(--accent);border-color:var(--accent);color:#fff}
        .tag-filter-chip-sidebar .count{font-size:11px;opacity:0.6;background:var(--bg-tertiary);padding:1px 6px;border-radius:999px;min-width:20px;text-align:center}
        .tag-filter-chip-sidebar.active .count{background:rgba(255,255,255,0.2);opacity:1}
        .tag-filter-chip-sidebar .check{display:none;font-size:12px;margin-right:4px}
        .tag-filter-chip-sidebar.active .check{display:inline}
        
        /* Content Area */
        .content-area{min-width:0;width:100%}
        /* Calendar mode - full width */
        .main.calendar-mode{grid-template-columns:1fr}
        
        /* Edit Panel */
        .edit-panel{display:none;background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:18px;margin-bottom:20px}
        .edit-panel.show{display:block}
        .edit-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
        .edit-header span{font-size:16px;font-weight:600;color:var(--accent);text-transform:uppercase;letter-spacing:0.05em}
        .edit-panel textarea{width:100%;min-height:90px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--bg-primary);color:var(--text-primary);font-size:17px;resize:vertical;transition:all 0.15s;font-family:inherit}
        .edit-panel textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-bg)}
        
        /* Ideas Grid - List Mode */
        .ideas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
        .idea-card{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:16px;transition:all 0.2s;display:flex;flex-direction:column;height:200px}
        .idea-card:hover{border-color:var(--border-light);box-shadow:var(--shadow);transform:translateY(-2px)}
        .idea-card.done{opacity:0.5}
        .idea-card.done .content{text-decoration:line-through;color:var(--text-muted)}
        .card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
        .priority-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:999px;font-size:16px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
        .priority-badge.high{background:rgba(245,101,101,0.12);color:var(--high)}
        .priority-badge.medium{background:rgba(237,137,54,0.12);color:var(--medium)}
        .priority-badge.low{background:rgba(72,187,120,0.12);color:var(--low)}
        .priority-badge.done{background:rgba(66,153,225,0.12);color:var(--done)}
        .card-actions{display:flex;gap:4px}
        .card-action-btn{width:26px;height:26px;border-radius:6px;border:none;background:var(--bg-tertiary);cursor:pointer;font-size:16px;color:var(--text-secondary);transition:all 0.15s;display:flex;align-items:center;justify-content:center}
        .card-action-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
        .content{font-size:17px;line-height:1.6;flex:1;overflow:hidden;margin-bottom:10px;color:var(--text-primary);max-width:100%;word-break:break-word}
        .content-preview{display:-webkit-box;-webkit-line-clamp:4;-webkit-box-orient:vertical;overflow:hidden;white-space:pre-wrap;word-break:break-word;max-width:100%}
        .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px}
        .tag{padding:3px 8px;background:var(--bg-tertiary);border-radius:6px;font-size:16px;color:var(--text-secondary);border:1px solid var(--border)}
        .card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border);margin-top:auto}
        .time{font-size:17px;color:var(--text-muted);font-family:var(--font-mono)}
        .btn-detail{padding:5px 11px;background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:17px;font-weight:500;transition:all 0.15s}
        .btn-detail:hover{background:var(--bg-hover);border-color:var(--border-light)}
        
        /* Swimlane Mode */
        .swimlanes{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
        .swimlane{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:14px;min-height:450px;display:flex;flex-direction:column}
        .swimlane-header{display:flex;align-items:center;gap:8px;padding:10px 12px;margin-bottom:12px;border-radius:var(--radius-sm);font-weight:600;font-size:17px;text-transform:uppercase;letter-spacing:0.05em}
        .swimlane-header.high{background:rgba(245,101,101,0.1);color:var(--high)}
        .swimlane-header.medium{background:rgba(237,137,54,0.1);color:var(--medium)}
        .swimlane-header.low{background:rgba(72,187,120,0.1);color:var(--low)}
        .swimlane-header.done{background:rgba(66,153,225,0.1);color:var(--done)}
        .swimlane-count{margin-left:auto;font-size:16px;opacity:0.6;background:var(--bg-tertiary);padding:2px 7px;border-radius:999px}
        .swimlane-cards{display:flex;flex-direction:column;gap:10px;flex:1;overflow-y:auto;max-height:calc(100vh - 280px);padding-right:4px}
        .swimlane-cards::-webkit-scrollbar{width:4px}
        .swimlane-cards::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
        .swimlane-card{background:var(--bg-primary);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;transition:all 0.15s;flex-shrink:0}
        .swimlane-card:hover{border-color:var(--border-light);box-shadow:0 2px 8px rgba(0,0,0,0.2)}
        .swimlane-card .content-preview{-webkit-line-clamp:3;font-size:16px}
        .swimlane-card .tags{margin-bottom:8px}
        .swimlane-card .card-footer{margin-top:8px;padding-top:8px}
        
        /* Calendar Mode */
        .calendar{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);padding:20px;overflow-x:auto;width:100%;box-sizing:border-box}
        .calendar-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:10px}
        .calendar-nav{display:flex;gap:8px;align-items:center}
        .calendar-nav button{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-primary);cursor:pointer;font-size:18px;color:var(--text-secondary);transition:all 0.15s;display:flex;align-items:center;justify-content:center}
        .calendar-nav button:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-light)}
        .calendar-title{font-size:18px;font-weight:600;margin:0 12px;min-width:120px;text-align:center}
        .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border)}
        .calendar-day-header{background:var(--bg-secondary);padding:14px;text-align:center;font-size:14px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em}
        .calendar-day{background:var(--bg-primary);min-height:100px;padding:8px;cursor:pointer;transition:all 0.15s;position:relative;border:none}
        .calendar-day:hover{background:var(--bg-secondary)}
        .calendar-day.today{background:rgba(94,106,210,0.08)}
        .calendar-day.other-month{opacity:0.3;background:var(--bg-tertiary)}
        .calendar-day-number{font-size:15px;font-weight:600;margin-bottom:6px;font-family:var(--font-mono);color:var(--text-secondary)}
        .calendar-day.today .calendar-day-number{background:var(--accent);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
        .calendar-idea-dot{font-size:12px;padding:4px 6px;background:var(--bg-tertiary);border-radius:4px;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border:1px solid var(--border);cursor:pointer}
        .calendar-idea-dot.high{background:rgba(245,101,101,0.12);color:var(--high);border-color:rgba(245,101,101,0.2)}
        .calendar-idea-dot.medium{background:rgba(237,137,54,0.12);color:var(--medium);border-color:rgba(237,137,54,0.2)}
        .calendar-idea-dot.low{background:rgba(72,187,120,0.12);color:var(--low);border-color:rgba(72,187,120,0.2)}
        
        /* Modal */
        .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:999;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .modal-overlay.show{display:flex}
        .modal{background:var(--bg-secondary);border:1px solid var(--border);border-radius:var(--radius);max-width:580px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:var(--shadow);animation:modalIn 0.25s ease}
        @keyframes modalIn{from{transform:scale(0.96);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px;border-bottom:1px solid var(--border)}
        .modal-title{font-size:16px;font-weight:600;color:var(--text-primary)}
        .modal-close{width:30px;height:30px;border-radius:6px;border:none;background:var(--bg-tertiary);cursor:pointer;font-size:16px;color:var(--text-secondary);transition:all 0.15s;display:flex;align-items:center;justify-content:center}
        .modal-close:hover{background:var(--high);color:#fff}
        .modal-body{padding:20px}
        .modal-content{font-size:16px;line-height:1.7;margin-bottom:18px;color:var(--text-primary);white-space:pre-wrap}
        .modal-meta{display:flex;gap:14px;font-size:17px;color:var(--text-muted);margin-bottom:14px;font-family:var(--font-mono)}
        .modal-meta span{display:flex;align-items:center;gap:5px}
        .modal-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
        .modal-footer{display:flex;gap:10px;padding:16px 20px;border-top:1px solid var(--border);background:var(--bg-primary)}
        .modal-footer button{padding:8px 16px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-size:16px;font-weight:500;transition:all 0.15s}
        .btn-primary{background:var(--accent);color:#fff}
        .btn-primary:hover{background:var(--accent-hover)}
        .btn-secondary{background:var(--bg-tertiary);color:var(--text-primary);border:1px solid var(--border)}
        .btn-secondary:hover{background:var(--bg-hover)}
        .btn-danger{background:rgba(245,101,101,0.12);color:var(--high);border:1px solid rgba(245,101,101,0.2)}
        .btn-danger:hover{background:var(--high);color:#fff}
        
        /* Empty State */
        .empty{text-align:center;padding:60px 20px;color:var(--text-muted)}
        .empty-icon{font-size:48px;margin-bottom:14px;opacity:0.3}
        .empty-text{font-size:17px}
        
        .hidden{display:none}
        
        /* Toast */
        .toast{position:fixed;bottom:24px;right:24px;padding:11px 18px;border-radius:var(--radius);background:var(--bg-secondary);border:1px solid var(--border);box-shadow:var(--shadow);z-index:1000;animation:slideIn 0.25s ease;font-size:16px;color:var(--text-primary)}
        .toast.error{border-color:var(--high);background:rgba(245,101,101,0.1)}
        .toast.success{border-color:var(--low);background:rgba(72,187,120,0.1)}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        
        /* Scrollbar */
        ::-webkit-scrollbar{width:8px;height:8px}
        ::-webkit-scrollbar-track{background:var(--bg-primary)}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
        ::-webkit-scrollbar-thumb:hover{background:var(--border-light)}
        
        /* Responsive */
        @media (max-width: 1200px){
            .swimlanes{grid-template-columns:repeat(2,1fr)}
        }
        @media (max-width: 900px){
            .main{grid-template-columns:1fr}
            .sidebar{display:none}
            .view-switcher-large{flex-direction:column}
            .view-btn-large{justify-content:center}
            .calendar-day{min-height:80px}
        }
        @media (max-width: 600px){
            .swimlanes{grid-template-columns:1fr}
            .filter-row{flex-direction:column;align-items:stretch}
            .priority-filter-selector,.status-filter-selector{flex-wrap:wrap}
            .calendar-day{min-height:60px}
            .calendar-day-number{font-size:13px}
            .calendar-idea-dot{font-size:10px;padding:2px 4px}
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💡 想法记录 <span class="version">v2.5.3</span></h1>
            <div class="header-actions">
                <button class="btn-icon" onclick="clearCompleted()" title="清空已完成">🗑️</button>
                <button class="btn-icon" onclick="exportData()" title="导出">📤</button>
                <button class="btn-icon" onclick="document.getElementById('importFile').click()" title="导入">📥</button>
                <input type="file" id="importFile" class="hidden" accept=".json" onchange="importData(event)">
                <button class="btn-icon" id="themeBtn" onclick="toggleTheme()" title="切换明暗">🌙</button>
            </div>
        </header>

        <!-- Add Section -->
        <section class="add-section">
            <div class="add-title">添加新想法</div>
            <div class="input-area">
                <div class="input-wrapper">
                    <textarea id="content" placeholder="有什么想法？写下来..."></textarea>
                    <div class="input-footer">
                        <input type="text" class="tag-input" id="tagInput" placeholder="标签，回车添加">
                        <div class="priority-selector">
                            <button class="pri-btn" id="priHigh" onclick="setPriority('high')">
                                <span class="pri-dot high"></span> 高
                            </button>
                            <button class="pri-btn active-medium" id="priMedium" onclick="setPriority('medium')">
                                <span class="pri-dot medium"></span> 中
                            </button>
                            <button class="pri-btn" id="priLow" onclick="setPriority('low')">
                                <span class="pri-dot low"></span> 低
                            </button>
                        </div>
                        <button class="btn-add" onclick="add()">添加想法</button>
                    </div>
                    <div class="selected-tags" id="selectedTags"></div>
                </div>
            </div>
        </section>

        <!-- View Switcher + Filter Section (Combined) -->
        <section class="filter-section" id="filterSection">
            <!-- View Switcher Row -->
            <div class="view-switcher-row" style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border)">
                <button class="view-btn-large active" id="viewList" onclick="setView('list')">
                    <span class="view-icon">📋</span> 列表
                </button>
                <button class="view-btn-large" id="viewSwim" onclick="setView('swim')">
                    <span class="view-icon">🏊</span> 泳道
                </button>
                <button class="view-btn-large" id="viewCal" onclick="setView('cal')">
                    <span class="view-icon">📅</span> 日历
                </button>
            </div>
            <!-- Filter Row -->
            <div class="filter-row">
                <!-- 优先级筛选 -->
                <div class="filter-group filter-group-priority" id="filterGroupPriority">
                    <span class="filter-label">优先级</span>
                    <div class="priority-filter-selector">
                        <button class="pri-filter-btn active" data-pri="" onclick="setFilterPriority('')">全部</button>
                        <button class="pri-filter-btn" data-pri="high" onclick="setFilterPriority('high')"><span class="pri-dot high"></span> 高</button>
                        <button class="pri-filter-btn" data-pri="medium" onclick="setFilterPriority('medium')"><span class="pri-dot medium"></span> 中</button>
                        <button class="pri-filter-btn" data-pri="low" onclick="setFilterPriority('low')"><span class="pri-dot low"></span> 低</button>
                    </div>
                </div>
                
                <!-- 完成状态筛选 -->
                <div class="filter-group filter-group-status" id="filterGroupStatus">
                    <span class="filter-label">状态</span>
                    <div class="status-filter-selector">
                        <button class="status-filter-btn active" data-status="" onclick="setFilterStatus('')">全部</button>
                        <button class="status-filter-btn" data-status="pending" onclick="setFilterStatus('pending')">⏳ 未完成</button>
                        <button class="status-filter-btn" data-status="done" onclick="setFilterStatus('done')">✅ 已完成</button>
                    </div>
                </div>
                
                <!-- 搜索框 -->
                <div class="search-box">
                    <input type="text" id="searchBox" placeholder="搜索内容或标签..." oninput="applyFilters()">
                </div>
            </div>
        </section>

        <div class="main">
            <!-- Sidebar - Tags Cloud (Multi-select) -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <span class="side-title">标签筛选 (多选)</span>
                </div>
                <div class="tags-filter-cloud-sidebar" id="tagsFilterCloudSidebar"></div>
            </aside>

            <!-- Content Area -->
            <main class="content-area">
                <!-- Edit Panel -->
                <div class="edit-panel" id="editPanel">
                    <div class="edit-header">
                        <span>✏️ 编辑想法</span>
                        <button class="card-action-btn" onclick="cancelEdit()">✕</button>
                    </div>
                    <textarea id="editContent" placeholder="内容..."></textarea>
                    <div class="input-footer" style="margin-top:12px;align-items:flex-start">
                        <div class="priority-selector" id="editPrioritySelector" style="margin-right:8px">
                            <button class="pri-btn" id="priHighEdit" onclick="setEditPriority('high')">
                                <span class="pri-dot high"></span> 高
                            </button>
                            <button class="pri-btn active-medium" id="priMediumEdit" onclick="setEditPriority('medium')">
                                <span class="pri-dot medium"></span> 中
                            </button>
                            <button class="pri-btn" id="priLowEdit" onclick="setEditPriority('low')">
                                <span class="pri-dot low"></span> 低
                            </button>
                        </div>
                        <input type="text" class="tag-input" id="editTagInput" placeholder="标签，回车添加" style="flex:1">
                        <button class="btn-add" onclick="saveEdit()">保存</button>
                    </div>
                    <div class="selected-tags" id="editTags" style="margin-top:10px"></div>
                </div>

                <!-- Ideas Display -->
                <div id="ideasDisplay"></div>
            </main>
        </div>
    </div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">想法详情</span>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-meta" id="modalMeta"></div>
                <div class="modal-tags" id="modalTags"></div>
                <div class="modal-content" id="modalContent"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal()">关闭</button>
                <button class="btn-primary" id="modalEditBtn" onclick="editFromModal()">编辑</button>
                <button class="btn-danger" id="modalDelBtn" onclick="deleteFromModal()">删除</button>
            </div>
        </div>
    </div>

    <script>
        const VERSION = '2.4.0';
        let ideas=[],tags=[],curTags=[],editCurTags=[],filterTags=[],filterPriority='',filterStatus='',searchText='',currentView='list',editId=null,curPriority='medium',editPriority='medium',isLoading=false,currentDetailId=null,calendarOffset=0;
        const api='';
        const CARD_HEIGHT = 200;
        
        function toast(msg,type='info'){
            const t=document.createElement('div');
            t.className='toast'+(type==='error'?' error':type==='success'?' success':'');
            t.textContent=msg;
            document.body.appendChild(t);
            setTimeout(()=>t.remove(),2500);
        }

        function toggleTheme(){
            const isLight = document.documentElement.getAttribute('data-theme') === 'linear-light';
            const newTheme = isLight ? 'linear' : 'linear-light';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', isLight ? 'dark' : 'light');
            document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
        }
        
        // 初始化主题
        (function initTheme(){
            const savedTheme = localStorage.getItem('theme');
            const theme = savedTheme === 'light' ? 'linear-light' : 'linear';
            document.documentElement.setAttribute('data-theme', theme);
            if(savedTheme === 'light') document.getElementById('themeBtn').textContent = '☀️';
        })();

        function fmt(t){
            const d=new Date(t),n=new Date(),diff=n-d;
            if(diff<6e4)return'刚刚';
            if(diff<36e5)return Math.floor(diff/6e4)+' 分钟前';
            if(diff<864e5)return Math.floor(diff/36e5)+' 小时前';
            if(diff<6048e5)return Math.floor(diff/864e5)+' 天前';
            return d.toLocaleDateString('zh-CN',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
        }

        function setPriority(p){
            curPriority=p;
            ['high','medium','low'].forEach(x=>{
                const btn=document.getElementById('pri'+x.charAt(0).toUpperCase()+x.slice(1));
                if(btn) btn.className='pri-btn'+(x===p?' active-'+x:'');
            });
        }



        async function load(){
            try{
                isLoading=true;
                const r=await fetch(api+'/api/ideas');
                if(!r.ok) throw new Error('加载失败');
                ideas=(await r.json()).ideas.sort((a,b)=>b.updatedAt-a.createdAt);
                const t=await fetch(api+'/api/tags');
                tags=(await t.json()).tags;
                render();
            }catch(e){
                toast('加载失败：'+e.message,'error');
            }finally{
                isLoading=false;
            }
        }

        function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML;}

        // 设置筛选优先级
        function setFilterPriority(pri){
            filterPriority = pri;
            document.querySelectorAll('.pri-filter-btn').forEach(btn=>{
                btn.classList.toggle('active', btn.dataset.pri === pri);
            });
            render();
        }
        
        // 设置筛选状态
        function setFilterStatus(status){
            filterStatus = status;
            document.querySelectorAll('.status-filter-btn').forEach(btn=>{
                btn.classList.toggle('active', btn.dataset.status === status);
            });
            render();
        }
        
        // 标签多选筛选
        function toggleFilterTag(name){
            const idx = filterTags.indexOf(name);
            if(idx >= 0) filterTags.splice(idx, 1);
            else filterTags.push(name);
            renderTagsFilterCloud();
            render();
        }
        
        // 渲染标签筛选云（多选，侧边栏）
        function renderTagsFilterCloud(){
            const container = document.getElementById('tagsFilterCloudSidebar');
            if(!tags.length){
                container.innerHTML = '<span style="color:var(--text-muted);font-size:14px">暂无标签</span>';
                return;
            }
            container.innerHTML = tags.map(t=>`
                <span class="tag-filter-chip-sidebar ${filterTags.includes(t.name)?'active':''}" onclick="toggleFilterTag('${esc(t.name)}')">
                    <span><span class="check">✓</span>${esc(t.name)}</span>
                    <span class="count">${t.count}</span>
                </span>
            `).join('');
        }
        
        // 应用筛选
        function applyFilters(){
            searchText=document.getElementById('searchBox').value.toLowerCase();
            render();
        }
        
        // 获取筛选后的想法列表
        function getFilteredIdeas(){
            let list=ideas;
            // 标签筛选（多选）
            if(filterTags.length) list=list.filter(i=>filterTags.some(t=>i.tags.includes(t)));
            // 优先级筛选
            if(filterPriority) list=list.filter(i=>i.priority===filterPriority);
            // 状态筛选
            if(filterStatus==='done') list=list.filter(i=>i.completed);
            else if(filterStatus==='pending') list=list.filter(i=>!i.completed);
            // 搜索
            if(searchText) list=list.filter(i=>i.content.toLowerCase().includes(searchText)||i.tags.some(t=>t.toLowerCase().includes(searchText)));
            return list;
        }
        
        // 设置视图
        function setView(v){
            currentView=v;
            ['list','swim','cal'].forEach(x=>{
                const btn=document.getElementById('view'+x.charAt(0).toUpperCase()+x.slice(1));
                if(btn) btn.classList.toggle('active',x===v);
            });
            // 根据视图调整筛选条件显示
            const filterSection = document.getElementById('filterSection');
            const sidebar = document.querySelector('.sidebar');
            const mainContainer = document.querySelector('.main');
            if(v==='swim'){
                // 泳道模式：隐藏优先级筛选（泳道本身就是按优先级分组），显示标签筛选
                filterSection.classList.add('hide-priority');
                filterSection.classList.remove('hide-status');
                sidebar.style.display = 'block';
                mainContainer.classList.remove('calendar-mode');
            }else if(v==='cal'){
                // 日历模式：隐藏优先级和状态筛选，隐藏标签侧边栏
                filterSection.classList.add('hide-priority', 'hide-status');
                sidebar.style.display = 'none';
                mainContainer.classList.add('calendar-mode');
            }else{
                // 列表模式：显示所有筛选
                filterSection.classList.remove('hide-priority', 'hide-status');
                sidebar.style.display = 'block';
                mainContainer.classList.remove('calendar-mode');
            }
            render();
        }

        function render(){
            const display=document.getElementById('ideasDisplay');
            const list=getFilteredIdeas();
            
            // 渲染标签筛选云
            renderTagsFilterCloud();
            
            if(currentView==='list'){
                renderList(display,list);
            }else if(currentView==='swim'){
                renderSwimlanes(display);
            }else if(currentView==='cal'){
                renderCalendar(display);
            }
        }

        function renderList(container,list){
            if(!list.length){
                const hasFilter = searchText || filterTags.length || filterPriority || filterStatus;
                container.innerHTML='<div class="empty"><div class="empty-icon">💭</div><div class="empty-text">'+(hasFilter?'没有找到匹配的想法':'还没有想法，写下第一个吧')+'</div></div>';
                return;
            }
            container.innerHTML='<div class="ideas-grid">'+list.map(i=>`
                <div class="idea-card ${i.completed?'done':''}" style="height:${CARD_HEIGHT}px">
                    <div class="card-header">
                        <span class="priority-badge ${i.completed?'done':i.priority||'low'}">${i.completed?'✅ 完成':{high:'🔴 高',medium:'🟡 中',low:'🟢 低'}[i.priority||'low']}</span>
                        <div class="card-actions">
                            <button class="card-action-btn" onclick="toggle('${i.id}')" title="完成">✓</button>
                            <button class="card-action-btn" onclick="startEdit('${i.id}')" title="编辑">✎</button>
                        </div>
                    </div>
                    <div class="content"><div class="content-preview">${esc(i.content)}</div></div>
                    ${i.tags.length?'<div class="tags">'+i.tags.map(t=>'<span class="tag">#'+esc(t)+'</span>').join('')+'</div>':''}
                    <div class="card-footer">
                        <span class="time">${fmt(i.updatedAt)}</span>
                        <button class="btn-detail" onclick="showDetail('${i.id}')">详情</button>
                    </div>
                </div>
            `).join('');
        }

        function renderSwimlanes(container){
            const lanes={high:[],medium:[],low:[],done:[]};
            // 泳道模式使用筛选后的数据，但不再按优先级过滤（泳道本身就是按优先级分组）
            const list = getFilteredIdeas();
            list.forEach(i=>{
                if(i.completed)lanes.done.push(i);
                else lanes[i.priority||'low'].push(i);
            });
            
            container.innerHTML='<div class="swimlanes">'+
                renderSwimlane('high','🔴 高优先级',lanes.high)+
                renderSwimlane('medium','🟡 中优先级',lanes.medium)+
                renderSwimlane('low','🟢 低优先级',lanes.low)+
                renderSwimlane('done','✅ 已完成',lanes.done)+
                '</div>';
        }

        function renderSwimlane(key,title,cards){
            return `<div class="swimlane">
                <div class="swimlane-header ${key}">${title}<span class="swimlane-count">${cards.length}</span></div>
                <div class="swimlane-cards">${cards.map(i=>`
                    <div class="swimlane-card">
                        <div class="content-preview">${esc(i.content)}</div>
                        ${i.tags.length?'<div class="tags">'+i.tags.map(t=>'<span class="tag">#'+esc(t)+'</span>').join('')+'</div>':''}
                        <div class="card-footer">
                            <span class="time">${fmt(i.updatedAt)}</span>
                            <button class="btn-detail" onclick="showDetail('${i.id}')" style="padding:3px 8px;font-size:16px">详情</button>
                        </div>
                    </div>
                `).join('')}</div>
            </div>`;
        }

        function renderCalendar(container){
            calendarOffset=0;
            const now=new Date();
            renderCalendarDisplay(now);
        }

        function changeMonth(delta){
            calendarOffset+=delta;
            const now=new Date();
            const target=new Date(now.getFullYear(),now.getMonth()+calendarOffset,1);
            renderCalendarDisplay(target);
        }
        
        function renderCalendarDisplay(targetDate){
            const display=document.getElementById('ideasDisplay');
            const year=targetDate.getFullYear();
            const month=targetDate.getMonth();
            const firstDay=new Date(year,month,1);
            const lastDay=new Date(year,month+1,0);
            const startDay=firstDay.getDay()||7;
            const prevLastDay=new Date(year,month,0);
            
            let html='<div class="calendar">';
            html+='<div class="calendar-header"><div class="calendar-nav"><button onclick="changeMonth(-1)">◀</button><span class="calendar-title">'+year+'年'+(month+1)+'月</span><button onclick="changeMonth(1)">▶</button><button onclick="resetCalendar()" style="margin-left:8px;font-size:17px;padding:5px 10px">今天</button></div></div>';
            html+='<div class="calendar-grid">';
            html+='<div class="calendar-day-header">日</div><div class="calendar-day-header">一</div><div class="calendar-day-header">二</div><div class="calendar-day-header">三</div><div class="calendar-day-header">四</div><div class="calendar-day-header">五</div><div class="calendar-day-header">六</div>';
            
            const today=new Date();
            const ideasByDate={};
            // 使用筛选后的数据
            const filteredIdeas = getFilteredIdeas();
            filteredIdeas.forEach(i=>{
                const d=new Date(i.updatedAt);
                const key=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
                if(!ideasByDate[key])ideasByDate[key]=[];
                ideasByDate[key].push(i);
            });
            
            // 调试：输出想法分布
            console.log('日历模式 - 想法分布:', Object.keys(ideasByDate).length, '天有想法');
            
            for(let i=startDay-1;i>0;i--){
                const day=prevLastDay.getDate()-i;
                html+='<div class="calendar-day other-month"><div class="calendar-day-number">'+day+'</div></div>';
            }
            
            for(let day=1;day<=lastDay.getDate();day++){
                const d=new Date(year,month,day);
                const isToday=d.getFullYear()===today.getFullYear()&&d.getMonth()===today.getMonth()&&d.getDate()===today.getDate();
                const key=year+'-'+month+'-'+day;
                const dayIdeas=ideasByDate[key]||[];
                
                html+='<div class="calendar-day'+(isToday?' today':'')+'" onclick="showDayIdeas(\''+key+'\','+day+')">';
                html+='<div class="calendar-day-number">'+day+'</div>';
                dayIdeas.slice(0,4).forEach(i=>{
                    html+='<div class="calendar-idea-dot '+i.priority+'" title="'+esc(i.content)+'">'+esc(i.content.substring(0,10))+(i.content.length>10?'...':'')+'</div>';
                });
                if(dayIdeas.length>4){
                    html+='<div style="font-size:13px;color:var(--text-muted);text-align:center;margin-top:4px">+'+(dayIdeas.length-4)+'更多</div>';
                }
                html+='</div>';
            }
            
            const remaining=42-(startDay-1)-lastDay.getDate();
            for(let i=1;i<=remaining;i++){
                html+='<div class="calendar-day other-month"><div class="calendar-day-number">'+i+'</div></div>';
            }
            
            html+='</div></div>';
            display.innerHTML=html;
        }
        
        function resetCalendar(){
            calendarOffset=0;
            render();
        }
        
        function showDayIdeas(key,day){
            const [year,month,date]=key.split('-').map(Number);
            const dayIdeas=ideas.filter(i=>{
                const d=new Date(i.updatedAt);
                return d.getFullYear()===year&&d.getMonth()===month&&d.getDate()===date;
            });
            if(!dayIdeas.length){toast('该日期没有想法','info');return;}
            const listHtml=dayIdeas.map(i=>'<div style="padding:8px;border-bottom:1px solid var(--border)"><div style="font-size:16px;margin-bottom:4px">'+esc(i.content)+'</div><div style="font-size:16px;color:var(--text-muted)">'+fmt(i.updatedAt)+'</div></div>').join('');
            const modal=document.createElement('div');
            modal.className='modal-overlay show';
            modal.innerHTML='<div class="modal" style="max-width:450px"><div class="modal-header"><span class="modal-title">'+year+'年'+(month+1)+'月'+day+'日 的想法</span><button class="modal-close" onclick="this.closest(\'.modal-overlay\').remove()">✕</button></div><div class="modal-body" style="max-height:400px;overflow-y:auto">'+listHtml+'</div><div class="modal-footer"><button class="btn-secondary" onclick="this.closest(\'.modal-overlay\').remove()">关闭</button></div></div>';
            document.body.appendChild(modal);
            modal.addEventListener('click',e=>{if(e.target===modal)modal.remove();});
        }

        function showDetail(id){
            const i=ideas.find(x=>x.id===id);
            if(!i) return;
            currentDetailId=id;
            
            document.getElementById('modalMeta').innerHTML=
                '<span>📅 创建 '+fmt(i.createdAt)+'</span>'+
                '<span>🔄 更新 '+fmt(i.updatedAt)+'</span>'+
                '<span>🏷️ '+(i.completed?'✅ 完成':{high:'🔴 高',medium:'🟡 中',low:'🟢 低'}[i.priority||'low'])+'</span>';
            
            document.getElementById('modalTags').innerHTML=i.tags.length?
                i.tags.map(t=>'<span class="tag">#'+esc(t)+'</span>').join(''):'<span style="color:var(--text-muted);font-size:16px">无标签</span>';
            
            document.getElementById('modalContent').textContent=i.content;
            document.getElementById('detailModal').classList.add('show');
        }

        function closeModal(){
            document.getElementById('detailModal').classList.remove('show');
            currentDetailId=null;
        }

        function editFromModal(){
            closeModal();
            if(currentDetailId) startEdit(currentDetailId);
        }

        function deleteFromModal(){
            if(currentDetailId) del(currentDetailId);
            closeModal();
        }

        function renderSelected(){
            const mainTags=document.getElementById('selectedTags');
            const editTags=document.getElementById('editTags');
            if(mainTags) mainTags.innerHTML=curTags.length?curTags.map(t=>'<span class="tag-chip">#'+esc(t)+' <span onclick="removeTag(\''+esc(t)+'\',false)">✕</span></span>').join(''):'<span style="opacity:.4;font-size:17px;color:var(--text-muted)">未添加标签</span>';
            if(editTags) editTags.innerHTML=editCurTags.length?editCurTags.map(t=>'<span class="tag-chip">#'+esc(t)+' <span onclick="removeTag(\''+esc(t)+'\',true)">✕</span></span>').join(''):'<span style="opacity:.4;font-size:17px;color:var(--text-muted)">未添加标签</span>';
        }

        function handleTagInput(e,isEdit){
            if(e.key===','||e.key==='Enter'||e.key===' '){
                e.preventDefault();
                const v=e.target.value.replace(/[,\s]+$/,'').trim();
                if(v){
                    const arr=isEdit?editCurTags:curTags;
                    v.split(/[,\s]+/).map(t=>t.trim()).filter(t=>t).forEach(t=>{if(!arr.includes(t))arr.push(t);});
                    e.target.value='';
                    renderSelected();
                }
            }
        }
        
        async function clearCompleted(){
            const done=ideas.filter(i=>i.completed);
            if(!done.length){toast('没有已完成的想法','info');return;}
            if(!confirm('确定清空 '+done.length+' 条已完成的想法？')) return;
            try{
                for(const i of done) await fetch(api+'/api/ideas/'+i.id,{method:'DELETE'});
                toast('已清空 '+done.length+' 条','success');
                load();
            }catch(e){toast('清空失败：'+e.message,'error');}
        }

        document.getElementById('tagInput').addEventListener('keydown',e=>handleTagInput(e,false));
        document.getElementById('editTagInput').addEventListener('keydown',e=>handleTagInput(e,true));

        async function add(){
            const c=document.getElementById('content').value.trim();
            if(!c){toast('请输入内容','error');return;}
            try{
                const result=await fetch(api+'/api/ideas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c,tags:[...curTags],priority:curPriority})});
                const data=await result.json();
                if(data.success){
                    document.getElementById('content').value='';
                    document.getElementById('tagInput').value='';
                    curTags=[];
                    renderSelected();
                    toast('添加成功','success');
                    load();
                }else{toast('添加失败：'+(data.error||'未知错误'),'error');}
            }catch(e){toast('网络错误：'+e.message,'error');}
        }

        function startEdit(id){
            const i=ideas.find(x=>x.id===id);
            if(!i) return;
            editId=id;
            editPriority=i.priority||'medium';
            document.getElementById('editContent').value=i.content;
            document.getElementById('editTagInput').value='';
            editCurTags=[...i.tags];
            updateEditPriorityUI();
            renderSelected();
            document.getElementById('editPanel').classList.add('show');
            document.getElementById('editTagInput').focus();
        }
        
        function setEditPriority(p){
            editPriority=p;
            updateEditPriorityUI();
        }
        
        function updateEditPriorityUI(){
            ['high','medium','low'].forEach(x=>{
                const btn=document.getElementById('pri'+x.charAt(0).toUpperCase()+x.slice(1)+'Edit');
                if(btn) btn.className='pri-btn'+(x===editPriority?' active-'+x:'');
            });
        }

        function cancelEdit(){
            editId=null;
            editCurTags=[];
            document.getElementById('editPanel').classList.remove('show');
        }

        async function saveEdit(){
            const c=document.getElementById('editContent').value.trim();
            if(!c){toast('内容不能为空','error');return;}
            try{
                const result=await fetch(api+'/api/ideas/'+editId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:c,tags:editCurTags,priority:editPriority})});
                const data=await result.json();
                if(data.success){toast('保存成功','success');cancelEdit();load();}
                else{toast('保存失败：'+(data.error||'未知错误'),'error');}
            }catch(e){toast('网络错误：'+e.message,'error');}
        }

        async function toggle(id){
            const i=ideas.find(x=>x.id===id);
            if(!i) return;
            try{
                await fetch(api+'/api/ideas/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:i.content,tags:i.tags,priority:i.priority,completed:!i.completed})});
                toast(i.completed?'已标记为未完成':'已完成','success');
                load();
            }catch(e){toast('操作失败：'+e.message,'error');}
        }

        async function del(id){
            if(!confirm('确定删除？')) return;
            try{
                const result=await fetch(api+'/api/ideas/'+id,{method:'DELETE'});
                if(result.ok){toast('删除成功','success');load();}
                else{toast('删除失败','error');}
            }catch(e){toast('网络错误：'+e.message,'error');}
        }

        async function exportData(){
            try{
                const r=await fetch(api+'/api/ideas');
                const data=await r.json();
                const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
                const a=document.createElement('a');a.href=URL.createObjectURL(blob);
                a.download='ideas-'+new Date().toISOString().split('T')[0]+'-v'+VERSION+'.json';
                a.click();
                toast('导出成功','success');
            }catch(e){toast('导出失败：'+e.message,'error');}
        }

        async function importData(e){
            const file=e.target.files[0];
            if(!file) return;
            try{
                const data=JSON.parse(await file.text());
                if(!data.ideas){toast('格式错误','error');return;}
                if(!confirm('导入 '+data.ideas.length+' 条？')) return;
                const result=await fetch(api+'/api/import',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
                const res=await result.json();
                if(res.success){toast('导入成功：'+res.importedCount+' 条','success');load();}
                else{toast('导入失败：'+(res.error||'未知错误'),'error');}
            }catch(err){toast('导入失败：'+err.message,'error');}
            e.target.value='';
        }

        document.getElementById('content').addEventListener('keydown',e=>{
            if(e.key==='Enter'&&e.ctrlKey){e.preventDefault();add();}
        });
        
        document.addEventListener('keydown',e=>{
            if(e.key==='Escape'){
                if(document.getElementById('editPanel').classList.contains('show')) cancelEdit();
                if(document.getElementById('detailModal').classList.contains('show')) closeModal();
            }
        });

        document.getElementById('detailModal').addEventListener('click',e=>{
            if(e.target.id==='detailModal') closeModal();
        });

        load();
    </script>
</body>
</html>
